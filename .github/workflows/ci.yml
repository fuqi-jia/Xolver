name: CI

# Build Xolver and run the unit + regression suites. The regression harness
# (tools/regression/run_regression.py) compares each verdict against the (set-info :status)
# embedded in the .smt2 file, so no external solver (z3/cvc5) is needed in CI.
# Exit is non-zero on any UNSOUND / UNEXPECTED_FAIL / TIMEOUT, which fails the job.

on:
  push:
    branches: [main]
  pull_request:           # run on every PR (any base), so stacked PRs are covered too
  workflow_dispatch:      # allow manual runs from the Actions tab

# Cancel an in-progress run when the same ref is pushed again.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive   # CaDiCaL + libpoly + SOMTParser

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential libgmp-dev libmpfr-dev python3

      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      # -j2 keeps peak compiler memory bounded — Solver.cpp / NiaSolver.cpp are
      # large -O3 translation units. Bump once the build is split / a runner with
      # more RAM is used.
      - name: Build
        run: cmake --build build -j2

      - name: Unit tests (doctest)
        run: ./build/tests/xolver_unit_tests

      # Use all runner cores. The only slow case is the heavy MetiTarski instance
      # nra_200 (genuinely minutes-class on the shared runner, not a contention
      # artifact), so the 240s per-case wall — not the job count — is what keeps it
      # green; everything else finishes in milliseconds.
      - name: Regression suite (xolver vs embedded :status)
        run: |
          python3 tools/regression/run_regression.py \
            --root tests/regression \
            --solver build/bin/xolver \
            --timeout 240 \
            -j "$(nproc)"

  # ---------------------------------------------------------------------------
  # Proof gate (Phase E): build the proofs-ON config and re-validate every
  # produced UNSAT proof with an INDEPENDENT external checker — drat-trim for the
  # DRAT Boolean core, Carcara for the Alethe theory certificates. A REJECTED
  # proof is a HARD failure (run_proof_corpus.sh exits non-zero): a wrong proof is
  # a release blocker exactly like a wrong verdict. NO-PROOF (degraded) is allowed
  # and only counted. This is the unsat-side analogue of the regression gate.
  proof-gate:
    name: proof-gate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential libgmp-dev libmpfr-dev python3

      # drat-trim (single C file, fast) + carcara (Rust; cargo is preinstalled on
      # ubuntu-latest). Binaries land under .proof-checkers/.
      - name: Install proof checkers
        run: bash tools/proof/install_checkers.sh

      - name: Configure (Release, proofs ON)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DXOLVER_ENABLE_PROOFS=ON

      - name: Build
        run: cmake --build build -j2

      # Gate every UNSAT across the proof-bearing lanes (Boolean DRAT + LRA/EUF/
      # IDL/RDL Alethe). run_proof_corpus.sh exits non-zero on any REJECTED.
      - name: Proof corpus gate (0 REJECTED)
        run: |
          DT="$PWD/.proof-checkers/drat-trim/drat-trim"
          CAR="$PWD/.proof-checkers/carcara/bin/carcara"
          grep -rl ':status unsat' \
            tests/regression/bool tests/regression/lra tests/regression/euf \
            tests/regression/idl tests/regression/rdl --include='*.smt2' \
            | sort -u > proof-gate-corpus.txt
          echo "Gating $(wc -l < proof-gate-corpus.txt) UNSAT instances with drat-trim + Carcara"
          bash tools/proof/run_proof_corpus.sh build/bin/xolver "$DT" proof-gate-corpus.txt "$CAR"
