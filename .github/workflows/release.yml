name: Release

# Push a tag like `v1.0.0` to build a fully static `xolver` binary + a developer
# library bundle and publish them as a GitHub Release. Run manually
# (workflow_dispatch) to test the packaging without creating a release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for a manual test build (no Release is created)'
        default: 'dev'

permissions:
  contents: write          # required for `gh release create`

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential libgmp-dev libmpfr-dev

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${GITHUB_REF_NAME:-}" ] && [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            echo "v=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "v=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      # Fully static executable (no runtime GMP/MPFR/libpoly dependency) so the
      # published binary runs on any x86_64 Linux without installing anything.
      - name: Configure (static Release)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DXOLVER_STATIC_BUILD=ON \
            -DXOLVER_BUILD_TESTS=OFF

      - name: Build (CLI + core)
        run: cmake --build build -j"$(nproc)" --target xolver-cli

      - name: Smoke-test the static binary
        run: |
          file build/bin/xolver
          echo "--- dynamic deps (expect 'not a dynamic executable') ---"
          ldd build/bin/xolver || true
          printf '(set-logic QF_LIA)(declare-fun x () Int)(assert (> x 0))(check-sat)\n' > /tmp/smoke.smt2
          out=$(./build/bin/xolver solve /tmp/smoke.smt2)
          echo "xolver says: $out"
          [ "$out" = "sat" ] || { echo "smoke test failed"; exit 1; }

      - name: Package (binary + library bundle + headers)
        run: |
          V="${{ steps.ver.outputs.v }}"
          PKG="xolver-${V}-linux-x86_64"
          mkdir -p "$PKG/bin" "$PKG/lib" "$PKG/include"

          # 1. runnable, fully static CLI
          cp build/bin/xolver "$PKG/bin/"
          strip "$PKG/bin/xolver" || true

          # 2. public headers + umbrella
          cp -r include/xolver "$PKG/include/"

          # 3. one combined static library (open libs only — never bundle pro).
          #    Users link: -Iinclude -Llib -lxolver -lgmp -lmpfr -lpthread
          {
            echo "create $PKG/lib/libxolver.a"
            for a in $(find build -name 'libxolver_core.a' -o -name 'libcadical.a' \
                        -o -name 'libpolyxx.a' -o -name 'libpoly.a' \
                        -o -name 'libsomtparser.a' | grep -v '/pro/'); do
              echo "addlib $a"
            done
            echo save
            echo end
          } | ar -M

          # 4. license + a short usage note
          cp LICENSE "$PKG/" 2>/dev/null || true
          cat > "$PKG/USAGE.md" <<EOF
          # Xolver ${V} — linux-x86_64

          ## Run the solver (no install needed; the binary is fully static)
              ./bin/xolver solve problem.smt2
              ./bin/xolver solve --produce-models problem.smt2

          ## Use as a C++ library
              g++ -std=c++20 -Iinclude app.cpp -Llib -lxolver -lgmp -lmpfr -lpthread

              #include <xolver/xolver.h>
              // xolver::Solver solver; solver.parseFile("p.smt2"); ...
          EOF

          tar -czf "${PKG}.tar.gz" "$PKG"
          sha256sum "${PKG}.tar.gz" | tee "${PKG}.tar.gz.sha256"
          echo "PKG=${PKG}" >> "$GITHUB_ENV"

      - name: Upload artifact (manual/test runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG }}
          path: |
            ${{ env.PKG }}.tar.gz
            ${{ env.PKG }}.tar.gz.sha256

      - name: Publish GitHub Release (tag pushes)
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "${PKG}.tar.gz" "${PKG}.tar.gz.sha256" \
            --title "Xolver ${GITHUB_REF_NAME}" \
            --generate-notes

  # ---------------------------------------------------------------------------
  # Python wheels (Linux x86_64, manylinux). Built on the SAME v* tag so
  # `pip install xolver==X.Y.Z` works right after a release. macOS/Windows wheels
  # are deferred (the int64_t<->gmpxx ambiguity needs a porting pass first).
  # ---------------------------------------------------------------------------
  wheels:
    name: python-wheels-linux-x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive   # cibuildwheel copies these into the container

      # Derive the wheel version from the tag (X.Y.Z) on the host and inject it
      # into the build, so setuptools_scm needs no git inside the manylinux
      # container. Manual runs get a dev version.
      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            # Manual run (TestPyPI rehearsal): unique dev version per run, since
            # TestPyPI also permanently reserves a version and rejects re-uploads.
            V="0.0.0.dev${{ github.run_number }}"
          fi
          echo "v=${V}" >> "$GITHUB_OUTPUT"
          echo "Building wheels for version ${V}"

      - name: Build sdist
        run: |
          python -m pip install --upgrade build
          SETUPTOOLS_SCM_PRETEND_VERSION="${{ steps.ver.outputs.v }}" \
            python -m build --sdist --outdir dist

      - name: Build wheels (cibuildwheel / manylinux)
        uses: pypa/cibuildwheel@v2.21
        env:
          # Recent CPythons; extend once build time is acceptable.
          CIBW_BUILD: "cp310-manylinux_x86_64 cp311-manylinux_x86_64 cp312-manylinux_x86_64"
          CIBW_ARCHS_LINUX: x86_64
          # manylinux2014 (CentOS 7) -> yum. GMP/MPFR are dynamically linked and
          # then vendored into the wheel by auditwheel (cibuildwheel runs it).
          CIBW_BEFORE_ALL_LINUX: "yum install -y gmp-devel mpfr-devel"
          # No git in the container -> hand setuptools_scm the version. Bound the
          # C++ build parallelism to the runner's cores to avoid OOM on the
          # heavy -O3 translation units.
          CIBW_ENVIRONMENT: >-
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ steps.ver.outputs.v }}
            CMAKE_BUILD_PARALLEL_LEVEL=2
          CIBW_BUILD_VERBOSITY: 1
          # Smoke-test every wheel: import + a trivial solve.
          CIBW_TEST_COMMAND: >-
            python -c "import xolver;
            x=xolver.Int('x');
            s=xolver.Solver(); s.add(x>0); s.add(x<2);
            assert str(s.check())=='sat', s.check();
            assert s.model()[x]==1, s.model();
            print('xolver', xolver.__version__, 'wheel OK')"
        with:
          output-dir: wheelhouse

      - name: Collect artifacts
        run: |
          mkdir -p pydist
          cp dist/*.tar.gz pydist/ 2>/dev/null || true
          cp wheelhouse/*.whl pydist/
          ls -l pydist

      # Always publish the dist as a build artifact so the separate publish job
      # (and manual/test runs) can consume it.
      - name: Upload dist artifact (wheels + sdist)
        uses: actions/upload-artifact@v4
        with:
          name: xolver-python-dist
          path: pydist/*

      - name: Attach wheels to the GitHub Release (tag pushes)
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" pydist/* --clobber

  # ---------------------------------------------------------------------------
  # Publish to PyPI via Trusted Publishing (OIDC) — NO API token is stored.
  # Prerequisite (one-time): on PyPI add a (pending) publisher for
  #   project `xolver`, owner `fuqi-jia`, repo `Xolver`, workflow `release.yml`,
  #   environment `pypi`.  https://pypi.org/manage/account/publishing/
  # Fires only on a v* tag; a dedicated job with the minimal id-token permission.
  # ---------------------------------------------------------------------------
  pypi-publish:
    name: publish-to-pypi
    needs: wheels
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/xolver/
    permissions:
      id-token: write        # OIDC — the only credential Trusted Publishing needs
    steps:
      - name: Download dist (wheels + sdist)
        uses: actions/download-artifact@v4
        with:
          name: xolver-python-dist
          path: pydist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pydist

  # ---------------------------------------------------------------------------
  # TestPyPI rehearsal — a REVERSIBLE dry run of the publish. Fires only on a
  # manual run (workflow_dispatch), never on a tag, so it can never touch real
  # PyPI. Uploads the wheels + sdist to test.pypi.org via Trusted Publishing.
  # Prerequisite (one-time): on test.pypi.org add a (pending) publisher for
  #   project `xolver`, owner `fuqi-jia`, repo `Xolver`, workflow `release.yml`,
  #   environment `testpypi`.  https://test.pypi.org/manage/account/publishing/
  # Verify after:  pip install -i https://test.pypi.org/simple/ xolver
  # ---------------------------------------------------------------------------
  testpypi-publish:
    name: publish-to-testpypi
    needs: wheels
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/xolver/
    permissions:
      id-token: write        # OIDC — no token stored
    steps:
      - name: Download dist (wheels + sdist)
        uses: actions/download-artifact@v4
        with:
          name: xolver-python-dist
          path: pydist
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: pydist
          skip-existing: true
