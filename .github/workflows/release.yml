name: Release

# Push a tag like `v1.0.0` to build per-platform "download & run" binaries plus a
# developer library bundle and publish them on a GitHub Release. Run manually
# (workflow_dispatch) to test the archives without creating a release.
#
# Linux is fully static (XOLVER_STATIC_BUILD=ON => -static). macOS can't link a
# fully-static executable (no static libSystem), so instead GMP/MPFR are forced
# static (their dylibs are hidden so -lgmp/-lmpfr resolve to the .a) while the
# always-present system libs stay dynamic — still a no-dependency download.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for a manual test build (no Release is created)'
        default: 'dev'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false          # one platform failing must not drop the others
      matrix:
        include:
          - os: ubuntu-latest
            arch: linux-x86_64
          - os: macos-latest
            arch: macos-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then echo "v=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else echo "v=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"; fi

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake build-essential libgmp-dev libmpfr-dev

      - name: Install dependencies (macOS, force static GMP/MPFR)
        if: runner.os == 'macOS'
        run: |
          brew install gmp mpfr
          # Hide the dynamic libs so the linker can only pick the static archives.
          rm -f "$(brew --prefix gmp)"/lib/libgmp*.dylib  "$(brew --prefix mpfr)"/lib/libmpfr*.dylib

      - name: Configure
        shell: bash
        run: |
          EXTRA=""
          [ "${{ runner.os }}" = "Linux" ] && EXTRA="-DXOLVER_STATIC_BUILD=ON"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DXOLVER_BUILD_TESTS=OFF $EXTRA

      - name: Build (CLI + core)
        run: cmake --build build -j"$(getconf _NPROCESSORS_ONLN)" --target xolver-cli

      - name: Smoke-test the binary
        shell: bash
        run: |
          file build/bin/xolver || true
          echo "--- runtime deps (expect only system libs) ---"
          ldd build/bin/xolver 2>/dev/null || otool -L build/bin/xolver 2>/dev/null || true
          printf '(set-logic QF_LIA)(declare-fun x () Int)(assert (> x 0))(check-sat)\n' > smoke.smt2
          out=$(./build/bin/xolver solve smoke.smt2)
          echo "xolver says: $out"
          [ "$out" = "sat" ] || { echo "smoke test failed"; exit 1; }

      - name: Package (binary + library bundle + headers)
        shell: bash
        run: |
          V="${{ steps.ver.outputs.v }}"
          PKG="xolver-${V}-${{ matrix.arch }}"
          mkdir -p "$PKG/bin" "$PKG/lib" "$PKG/include"
          cp build/bin/xolver "$PKG/bin/"; strip "$PKG/bin/xolver" || true
          cp -r include/xolver "$PKG/include/"
          {
            echo "create $PKG/lib/libxolver.a"
            for a in $(find build -name 'libxolver_core.a' -o -name 'libcadical.a' \
                        -o -name 'libpolyxx.a' -o -name 'libpoly.a' \
                        -o -name 'libsomtparser.a' | grep -v '/pro/'); do echo "addlib $a"; done
            echo save; echo end
          } | ar -M
          cp LICENSE "$PKG/" 2>/dev/null || true
          cat > "$PKG/USAGE.md" <<EOF
          # Xolver ${V} — ${{ matrix.arch }}
          ## Run (no install needed)
              ./bin/xolver solve problem.smt2
          ## Link as a C++ library
              c++ -std=c++20 -Iinclude app.cpp -Llib -lxolver -lgmp -lmpfr -lpthread
              #include <xolver/xolver.h>
          EOF
          tar -czf "${PKG}.tar.gz" "$PKG"
          (command -v sha256sum >/dev/null && sha256sum "${PKG}.tar.gz" || shasum -a 256 "${PKG}.tar.gz") > "${PKG}.tar.gz.sha256"
          echo "PKG=${PKG}" >> "$GITHUB_ENV"

      - name: Upload artifact (manual/test runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG }}
          path: |
            ${{ env.PKG }}.tar.gz
            ${{ env.PKG }}.tar.gz.sha256

      - name: Publish to GitHub Release (tag pushes)
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # First platform creates the release; the rest just add their assets.
          gh release create "${GITHUB_REF_NAME}" --title "Xolver ${GITHUB_REF_NAME}" --generate-notes 2>/dev/null || true
          gh release upload "${GITHUB_REF_NAME}" "${PKG}.tar.gz" "${PKG}.tar.gz.sha256" --clobber
